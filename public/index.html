<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>forge-ci</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">▲</div>
      <div class="brand">forge <span>/ ci</span></div>
      <div class="header-right">
        <span id="queue-info" class="chip"></span>
      </div>
    </div>
  </header>

  <div class="wrap">
    <form class="trigger-bar" id="trigger-form">
      <input name="repoUrl" placeholder="Repository URL or local path (e.g. /Users/you/project)" required />
      <input name="branch" placeholder="branch" value="main" />
      <button type="submit" class="primary">Run pipeline</button>
    </form>

    <p class="section-title">Builds</p>
    <div id="builds"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
